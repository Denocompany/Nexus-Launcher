name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  Build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm64" ]
      fail-fast: false
    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || 'DUMMY' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: chmod +x gradlew && mkdir -p out && ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Release APK (${{ matrix.arch }})
        run: ./gradlew ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }} --no-daemon

      - name: Collect APK
        run: |
          VERSION=$(grep 'launcher_version_name' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          mkdir -p /tmp/apks
          find ZalithLauncher/build/outputs/apk/release -name "*.apk" | head -1 | \
            xargs -I{} cp {} "/tmp/apks/NexusLauncher-v${VERSION}-${{ matrix.arch }}.apk"
          ls -lh /tmp/apks/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusLauncher-${{ matrix.arch }}
          path: /tmp/apks/*.apk
          if-no-files-found: error

  Release:
    needs: Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          echo "version=$(grep 'launcher_version_name' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          echo "code=$(grep 'launcher_version_code' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release_apks
          merge-multiple: true

      - name: Write release notes
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          CODE=${{ steps.ver.outputs.code }}
          SHA=$(git rev-parse --short HEAD)
          cat > /tmp/release_notes.md << EOF
          ## Nexus Launcher v${VERSION} (Build ${CODE}) — ${SHA}

          ### Download directo (sem login necessario)
          - **NexusLauncher-v${VERSION}-arm64.apk** — para a maioria dos telemoveis modernos (recomendado)
          - **NexusLauncher-v${VERSION}-all.apk** — universal (todos os dispositivos)

          ### Como instalar
          1. Clique no ficheiro APK acima para descarregar
          2. Ative Fontes desconhecidas nas definicoes do Android
          3. Instale o APK

          ### Alteracoes v1.5.0.0
          - SolarSystemScreen: Canvas Compose puro, zero nativeCanvas
          - PerformanceScreen: grafico FPS em Canvas Compose
          - Correcao de 41 erros de compilacao
          - DataStore persistencia: nexus_prefs
          - 8 ViewModels integrados
          EOF

      - name: Delete previous release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.ver.outputs.version }}" --yes 2>/dev/null || true
          git push --delete origin "v${{ steps.ver.outputs.version }}" 2>/dev/null || true

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "Nexus Launcher v${{ steps.ver.outputs.version }}" \
            --notes-file /tmp/release_notes.md \
            --latest \
            $(find /tmp/release_apks -name "*.apk" | sort | tr '\n' ' ')

  BuildPR:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-22.04
    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || 'DUMMY' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: chmod +x gradlew && mkdir -p out && ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Release APK (arm64)
        run: ./gradlew ZalithLauncher:assembleRelease -Darch=arm64 --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusLauncher-PR-arm64
          path: ZalithLauncher/build/outputs/apk/release/*.apk
