name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  BuildDebugRelease:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || 'DUMMY' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build APK (${{ matrix.arch }})
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} --no-daemon

      - name: Rename APK
        run: |
          VERSION=$(grep 'launcher_version_name' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          ARCH=${{ matrix.arch }}
          mkdir -p /tmp/apks
          find ZalithLauncher/build/outputs/apk/debug -name "*.apk" | head -1 | \
            xargs -I{} cp {} /tmp/apks/NexusLauncher-v${VERSION}-${ARCH}.apk
          ls /tmp/apks/

      - name: Upload APK artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: NexusLauncher-${{ matrix.arch }}
          path: /tmp/apks/*.apk
          if-no-files-found: warn

  CreateRelease:
    needs: BuildDebugRelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          V=$(grep 'launcher_version_name' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          C=$(grep 'launcher_version_code' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "code=$C" >> $GITHUB_OUTPUT

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release_apks
          merge-multiple: true

      - name: List APKs
        run: find /tmp/release_apks -name "*.apk" | sort

      - name: Remove existing release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.ver.outputs.version }}" --yes 2>/dev/null || true
          git push --delete origin "v${{ steps.ver.outputs.version }}" 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          CODE=${{ steps.ver.outputs.code }}
          SHA=$(git rev-parse --short HEAD)
          APK_FILES=$(find /tmp/release_apks -name "*.apk" | sort | tr '\n' ' ')

          NOTES="Nexus Launcher v${VERSION} (Build ${CODE}) - Commit ${SHA}

          Changes in v1.5.0.0:
          - Fixed 3 Kotlin compilation errors (ModsScreen, PerformanceScreen, SolarSystemScreen)
          - Jetpack DataStore persistence layer (nexus_prefs)
          - 8 ViewModels: Home, Performance, Visual, Mods, Instances, Accounts, Settings, Solar
          - NexusMainActivity wires DataStore to NavHost
          - VisualScreen, AccountsScreen, SettingsScreen integrated with DataStore
          - Added lifecycle-runtime-compose dependency
          - Version bump to 1.5.0.0 (code 150000)

          Installation:
          Download the APK for your device architecture (arm64 for most modern devices)
          Enable Unknown Sources, install the APK."

          gh release create "v${VERSION}" \
            --title "Nexus Launcher v${VERSION}" \
            --notes "$NOTES" \
            --latest \
            $APK_FILES

  BuildPR:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug APK (${{ matrix.arch }})
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || 'DUMMY' }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} --no-daemon

      - name: Upload Debug APK (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: NexusLauncher-Debug-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*
