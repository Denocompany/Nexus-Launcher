name: Android CI — Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── BUILD RELEASE (com keystore, só no main) ────────────────────────────────
  BuildRelease:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || 'DUMMY' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Release ${{ matrix.arch }} (with signing)
        id: build_release
        if: ${{ secrets.MOVTERY_KEYSTORE_PASSWORD != '' }}
        env:
          MOVTERY_KEYSTORE_PASSWORD: ${{ secrets.MOVTERY_KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }} --no-daemon
          echo "signed=true" >> $GITHUB_OUTPUT

      - name: Build Debug fallback ${{ matrix.arch }} (sem keystore)
        if: ${{ secrets.MOVTERY_KEYSTORE_PASSWORD == '' }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} --no-daemon

      - name: Rename APK for arch
        run: |
          ARCH=${{ matrix.arch }}
          VERSION=$(grep 'launcher_version_name' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          RELEASE_DIR="ZalithLauncher/build/outputs/apk/release"
          DEBUG_DIR="ZalithLauncher/build/outputs/apk/debug"
          mkdir -p /tmp/apk_output
          if ls "$RELEASE_DIR"/*.apk 2>/dev/null | head -1 | grep -q '.'; then
            cp "$RELEASE_DIR"/*.apk /tmp/apk_output/NexusLauncher-v${VERSION}-${ARCH}-release.apk || true
          elif ls "$DEBUG_DIR"/*.apk 2>/dev/null | head -1 | grep -q '.'; then
            cp "$DEBUG_DIR"/*.apk /tmp/apk_output/NexusLauncher-v${VERSION}-${ARCH}-debug.apk || true
          fi
          ls /tmp/apk_output/ || echo "No APK found"

      - name: Upload APK artifact ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: NexusLauncher-${{ matrix.arch }}
          path: /tmp/apk_output/*.apk
          if-no-files-found: warn

  # ── CREATE GITHUB RELEASE (apenas arch=all, após build) ─────────────────────
  CreateRelease:
    needs: BuildRelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'launcher_version_name' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          CODE=$(grep 'launcher_version_code' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Nexus Launcher v$VERSION (code $CODE)"

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: /tmp/release_apks
          merge-multiple: true

      - name: List APKs
        run: find /tmp/release_apks -name "*.apk" | sort

      - name: Delete existing release tag if present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          git push --delete origin "v${VERSION}" 2>/dev/null || true

      - name: Create GitHub Release with all APKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CODE=${{ steps.version.outputs.code }}
          COMMIT_SHA=$(git rev-parse --short HEAD)

          NOTES="## Nexus Launcher v${VERSION} (Build ${CODE})

          ### O que há de novo
          - ✅ 3 erros de compilação Kotlin corrigidos (ModsScreen, PerformanceScreen, SolarSystemScreen)
          - 💾 Jetpack DataStore (Preferences) — persistência completa em \`nexus_prefs\`
          - 🏗 8 ViewModels: Home, Performance, Visual, Mods, Instances, Accounts, Settings, Solar
          - 🔌 NexusMainActivity inicializa DataStore e passa ao NavHost
          - 🗺 NexusNavHost.kt faz wiring completo com DataStore
          - 🎨 VisualScreen, AccountsScreen e SettingsScreen integrados com DataStore
          - 📦 Build DataStore: \`androidx.datastore:datastore-preferences:1.0.0\`
          - 📦 Build Compose: \`lifecycle-runtime-compose\` adicionado

          ### Instalação
          1. Baixe o APK correspondente à sua arquitetura (\`arm64\` para maioria dos dispositivos modernos)
          2. Habilite **Fontes desconhecidas** → **Instalar apps desconhecidos**
          3. Instale o APK
          4. Commit: \`${COMMIT_SHA}\`"

          APK_FILES=$(find /tmp/release_apks -name "*.apk" | sort | xargs -I{} echo '{}')
          
          gh release create "v${VERSION}" \
            --title "Nexus Launcher v${VERSION}" \
            --notes "$NOTES" \
            --latest \
            $APK_FILES

  # ── BUILD DEBUG (PRs e workflow_dispatch) ───────────────────────────────────
  BuildDebug:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug ${{ matrix.arch }}
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY || 'DUMMY' }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} --no-daemon

      - name: Upload Debug ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: NexusLauncher-Debug-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*
