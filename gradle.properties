launcher_name=NexusLauncher
launcher_app_name=Nexus Launcher

launcher_version_code=150000
launcher_version_name=1.5.0.0

# AndroidX migration (required for release build)
android.useAndroidX=true
android.enableJetifier=true

# Gradle JVM heap — prevents OutOfMemoryError on CI
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
